<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Flight Tracker | Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #020617;
        color: #e2e8f0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(14, 165, 233, 0.28), transparent 42%),
          linear-gradient(180deg, #0f172a 0%, #020617 100%);
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 24px;
        padding: 2rem;
        background: rgba(15, 23, 42, 0.82);
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.6;
        color: #cbd5e1;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.75rem;
        padding: 0 1rem;
        border-radius: 999px;
        background: #38bdf8;
        color: #082f49;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Flight Tracker is offline</h1>
      <p>Your connection dropped before the next screen could load.</p>
      <p>Reconnect and reopen the game to keep guessing countries, capitals, and flags.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
