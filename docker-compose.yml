services:
  mongodb:
    image: mongo:7
    container_name: tracker-mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracker-app
    depends_on:
      - mongodb
    ports:
      - "4109:4109"
    environment:
      NODE_ENV: development
      PORT: 4109
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      OPENSKY_CLIENT_ID: ${OPENSKY_CLIENT_ID:-}
      OPENSKY_CLIENT_SECRET: ${OPENSKY_CLIENT_SECRET:-}
      AVIATION_STACK_API_KEY: ${AVIATION_STACK_API_KEY:-}
      AIRLABS_API_KEY: ${AIRLABS_API_KEY:-}
      FLIGHT_AWARE_API_KEY: ${FLIGHT_AWARE_API_KEY:-}
      FLIGHTAWARE_API_KEY: ${FLIGHTAWARE_API_KEY:-}
      RAPIDAPI_AERODATABOX_API_KEY: ${RAPIDAPI_AERODATABOX_API_KEY:-}
      AERODATABOX_RAPIDAPI_KEY: ${AERODATABOX_RAPIDAPI_KEY:-}
      ENABLED_API_PROVIDERS: ${ENABLED_API_PROVIDERS:-}
      DISABLED_API_PROVIDERS: ${DISABLED_API_PROVIDERS:-}
      OPENSKY_DISABLED: ${OPENSKY_DISABLED:-}
      FLIGHTAWARE_DISABLED: ${FLIGHTAWARE_DISABLED:-}
      AVIATIONSTACK_DISABLED: ${AVIATIONSTACK_DISABLED:-}
      AIRLABS_DISABLED: ${AIRLABS_DISABLED:-}
      AERODATABOX_DISABLED: ${AERODATABOX_DISABLED:-}
      AIRLABS_CACHE_TTL_SECONDS: ${AIRLABS_CACHE_TTL_SECONDS:-300}
      AERODATABOX_MIN_REQUEST_GAP_MS: ${AERODATABOX_MIN_REQUEST_GAP_MS:-1200}
      AERODATABOX_CACHE_TTL_SECONDS: ${AERODATABOX_CACHE_TTL_SECONDS:-43200}
      CRON_SECRET: ${CRON_SECRET:-}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/tracker}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-tracker}
      OPENSKY_CACHE_TTL_SECONDS: ${OPENSKY_CACHE_TTL_SECONDS:-300}
      TRACKER_SHARED_CACHE_MAX_TRACK_POINTS: ${TRACKER_SHARED_CACHE_MAX_TRACK_POINTS:-600}
      TRACKER_SHARED_CACHE_MAX_FETCH_HISTORY: ${TRACKER_SHARED_CACHE_MAX_FETCH_HISTORY:-2500}
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4109/api/tracker/cron/config || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  tracker-cron:
    image: curlimages/curl:8.12.1
    container_name: tracker-cron
    depends_on:
      tracker:
        condition: service_healthy
    environment:
      TRACKER_CRON_URL: ${TRACKER_CRON_URL:-http://tracker:4109/api/tracker/cron}
      TRACKER_CRON_INTERVAL_SECONDS: ${TRACKER_CRON_INTERVAL_SECONDS:-900}
      TRACKER_CRON_STARTUP_DELAY_SECONDS: ${TRACKER_CRON_STARTUP_DELAY_SECONDS:-20}
      CRON_SECRET: ${CRON_SECRET:-}
    volumes:
      - ./docker:/scripts:ro
    command: ["/bin/sh", "/scripts/tracker-cron.sh"]
    restart: unless-stopped

volumes:
  mongodb_data:
