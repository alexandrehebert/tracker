services:
  mongodb:
    image: mongo:7
    container_name: tracker-mongodb
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracker-app
    depends_on:
      - mongodb
    ports:
      - "4109:4109"
    environment:
      NODE_ENV: development
      PORT: 4109
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      OPENSKY_CLIENT_ID: ${OPENSKY_CLIENT_ID:-}
      OPENSKY_CLIENT_SECRET: ${OPENSKY_CLIENT_SECRET:-}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/tracker}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-tracker}
      OPENSKY_CACHE_TTL_SECONDS: ${OPENSKY_CACHE_TTL_SECONDS:-300}
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  mongodb_data:
